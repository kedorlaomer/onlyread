<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OnlyRead</title>
    <link rel="icon" type="image/png" href="images/only_read.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body {
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        .feed-list {
            text-align: left;
            margin-top: 2rem;
        }
        .feed-item {
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .feed-form {
            margin-top: 2rem;
        }
        .error {
            color: red;
            margin-top: 0.5rem;
        }
        .success {
            color: green;
            margin-top: 0.5rem;
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .nav-link {
            cursor: pointer;
            color: #0078e4;
        }
        .nav-link.active {
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/only_read.png" alt="OnlyRead Logo" style="max-width: 150px; margin-bottom: 1rem;">
        
        <div id="login-page">
            <p>Please log in to continue.</p>
            <button id="login-btn" class="pure-button pure-button-primary">Log In</button>
        </div>

        <div id="user-page" class="hidden">
            <div class="nav-bar">
                <span id="nav-read" class="nav-link">Read</span>
                <span id="nav-manage" class="nav-link">Manage</span>
                <span id="nav-logout" class="nav-link">Logout</span>
            </div>
            
            <div id="page-read" class="page hidden">
                <p>Coming soon...</p>
            </div>
            
            <div id="page-manage" class="page">
                <h1>Welcome, <span id="user-name"></span>!</h1>
                
                <div class="feed-form">
                    <h3>Subscribe to RSS Feed</h3>
                    <form id="subscribe-form" class="pure-form">
                        <input type="url" id="feed-url" placeholder="https://example.com/feed.xml" required>
                        <button type="submit" class="pure-button pure-button-primary">Subscribe</button>
                    </form>
                    <div id="feed-message"></div>
                </div>

                <div class="feed-form">
                    <h3>Import Feeds</h3>
                    <form id="import-form" class="pure-form">
                        <input type="file" id="import-file" accept=".txt,.opml,.xml">
                        <button type="submit" class="pure-button">Import</button>
                    </form>
                    <div id="import-message"></div>
                </div>

                <div class="feed-list">
                    <h3>Your Feeds</h3>
                    <div style="margin-bottom: 1rem;">
                        <button id="export-opml-btn" class="pure-button pure-button-small">Export OPML</button>
                        <button id="export-text-btn" class="pure-button pure-button-small">Export Text</button>
                    </div>
                    <div id="feeds-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
