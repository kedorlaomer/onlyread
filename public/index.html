<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OnlyRead</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body {
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/only_read.jpg" alt="OnlyRead Logo" style="max-width: 200px; margin-bottom: 1rem;">
        
        <div id="login-page">
            <p>Please log in to continue.</p>
            <button id="login-btn" class="pure-button pure-button-primary">Log In</button>
        </div>

        <div id="user-page" class="hidden">
            <h1>Welcome, <span id="user-name"></span>!</h1>
            <button id="logout-btn" class="pure-button pure-button-secondary">Log Out</button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
